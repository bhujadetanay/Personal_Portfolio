<!DOCTYPE html>
<html>

<head>
    <title>Semantic Elements</title>
</head>

<body>

    <header>
        <h1>My Website</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Welcome</h2>
            <p>This is the main section of the page.</p>
        </section>

        <article>
            <h2>Blog Post</h2>
            <p>This is a sample blog post using the article tag.</p>
        </article>

        <aside>
            <h3>Side Note</h3>
            <p>This is extra information in the aside tag.</p>
        </aside>
    </main>

    <footer>
        <p>Copyright 2026. All rights reserved.</p>
    </footer>

</body>

</html>
