<!DOCTYPE html>
<html>
<head>
  <style>
    .box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 200px;
      height: 300px;
      border: 2px solid black;
    }

    .circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: blue;
    }
  </style>
</head>
<body>

  <div class="box">
    <div class="circle"></div>
    <div class="circle"></div>
  </div>

</body>
</html>
