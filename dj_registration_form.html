<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dj Registration Form</title>
</head>

<body>

  <h2>Dj Resistration form</h2>

  Full name: <input type="text" placeholder="Enter your name" /><br /><br />

  Email: <input type="email" placeholder="Enter your email" /><br /><br />

  Password: <input type="password" placeholder="Enter your password" /><br /><br />

  Date of birth: <input type="date" /><br /><br />

  Phone number: <input type="tel" placeholder="Enter ur 10 digit number" maxlength="10" /><br /><br />

  Height: <input type="text" placeholder="Enter your height" /><br /><br />

  Radio buttons:
  <input type="radio" name="gender" value="male" /> Male
  <input type="radio" name="gender" value="female" /> Female
  <input type="radio" name="gender" value="others" /> Others
  <br /><br />

  Hobbies:
  <input type="checkbox" name="hobbies" value="football" /> Football
  <input type="checkbox" name="hobbies" value="cricket" /> Cricket
  <input type="checkbox" name="hobbies" value="badminton" /> Badminton
  <br /><br />

  Course:
  <select name="course">
    <option value="">Select Course</option>
    <option value="bsc">BSc</option>
    <option value="bcom">BCom</option>
    <option value="ba">BA</option>
    <option value="be">BE</option>
  </select>
  <br /><br />

  Chaat:
  <select name="chaat" size="4">
    <option value="">Select Chaat</option>
    <option value="panipuri">Pani Puri</option>
    <option value="bhelpuri">Bhel Puri</option>
    <option value="dahipuri">Dahi Puri</option>
  </select>
  <br /><br />

  Upload your picture: <input type="file" name="picture" accept="image/*" /><br /><br />

  <input type="submit" value="Submit" />

</body>

</html>
